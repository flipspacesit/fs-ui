<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23ffc100'/%3E%3Ctext x='16' y='22' font-family='Inter,sans-serif' font-size='15' font-weight='800' text-anchor='middle' fill='%231b1c1e'%3Efs%3C/text%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="fs-ui — the Flipspaces React + MUI design system. Components, tokens and hooks."
    />
    <title>fs-ui · Flipspaces Design System</title>
    <style>
      :root {
        --scale: 1;
      }
      html {
        background-color: #f1f7ff;
      }
      html[data-theme="dark"] {
        background-color: #04091f;
      }
    </style>
    <!-- No-FOUC: apply the stored/system theme before first paint -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem("fsui-docs-theme") || "light";
          var d =
            s === "dark" ||
            (s === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute(
            "data-theme",
            d ? "dark" : "light"
          );
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
